name: 🤖 LLM Man — Mise à jour News
on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:       # Déclenchement manuel
permissions:
  contents: write
jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        working-directory: scripts
      - name: Récupérer les news LLM & Agents
        run: node scripts/fetch-news.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      - name: Commit & Push news.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📰 auto: mise à jour news LLM & Agents"
          commit_user_name: "LLM Man Bot"
          commit_user_email: "bot@llm-man.dev"
          file_pattern: "news.json"
